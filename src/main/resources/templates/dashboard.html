<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>CRM Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div class="container mt-4">
    <h1 class="mb-4">CRM Dashboard</h1>
    <div class="row g-3">
        <div class="col-md-4">
            <div class="card text-white bg-primary">
                <div class="card-body">
                    <h5 class="card-title">Mijozlar</h5>
                    <p class="card-text fs-3" th:text="${totalCustomers}">0</p>
                </div>
            </div>
        </div>
        <div class="col-md-4">
            <div class="card text-white bg-success">
                <div class="card-body">
                    <h5 class="card-title">Buyurtmalar</h5>
                    <p class="card-text fs-3" th:text="${totalOrders}">0</p>
                </div>
            </div>
        </div>
        <div class="col-md-4">
            <div class="card text-white bg-warning">
                <div class="card-body">
                    <h5 class="card-title">Mahsulotlar</h5>
                    <p class="card-text fs-3" th:text="${totalProducts}">0</p>
                </div>
            </div>
        </div>
        <div class="col-md-4">
            <div class="card text-white bg-info">
                <div class="card-body">
                    <h5 class="card-title">Faol mijozlar</h5>
                    <p class="card-text fs-3" th:text="${activeCustomers}">0</p>
                </div>
            </div>
        </div>
        <div class="col-md-4">
            <div class="card text-white bg-danger">
                <div class="card-body">
                    <h5 class="card-title">Kutilayotgan buyurtmalar</h5>
                    <p class="card-text fs-3" th:text="${pendingOrders}">0</p>
                </div>
            </div>
        </div>
        <div class="col-md-4">
            <div class="card text-white bg-secondary">
                <div class="card-body">
                    <h5 class="card-title">Umumiy daromad</h5>
                    <p class="card-text fs-3" th:text="${totalRevenue}">0</p>
                </div>
            </div>
        </div>
    </div>

    <div class="mt-4">
        <a href="/customers" class="btn btn-primary me-2">Mijozlar</a>
        <a href="/orders" class="btn btn-success me-2">Buyurtmalar</a>
        <a href="/products" class="btn btn-warning">Mahsulotlar</a>
    </div>
</div>
</body>
</html>
