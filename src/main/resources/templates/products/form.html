<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="uz">
<head th:replace="~{fragments/layout :: head('Mahsulot')}"></head>
<body>
<div class="app-layout">
    <div th:replace="~{fragments/layout :: sidebar}"></div>
    <main class="main-content">
        <div th:replace="~{fragments/layout :: topbar('Mahsulot qo\'shish / tahrirlash')}"></div>
        <div class="content-body">
            <div class="section-card form-card">
                <form th:action="@{/products/save}" th:object="${product}" method="post">
                    <input type="hidden" th:field="*{id}"/>
                    <div class="form-grid">
                        <div class="form-group">
                            <label>Nom *</label>
                            <input type="text" th:field="*{name}" class="form-input" placeholder="Mahsulot nomi"/>
                            <span class="form-error" th:if="${#fields.hasErrors('name')}" th:errors="*{name}"></span>
                        </div>
                        <div class="form-group">
                            <label>Kategoriya</label>
                            <input type="text" th:field="*{category}" class="form-input" placeholder="Kiyim, Aksessuar..."/>
                        </div>
                        <div class="form-group">
                            <label>SKU kodi</label>
                            <input type="text" th:field="*{sku}" class="form-input" placeholder="SKU-001"/>
                        </div>
                        <div class="form-group">
                            <label>Narx ($) *</label>
                            <input type="number" step="0.01" th:field="*{price}" class="form-input" placeholder="0.00"/>
                            <span class="form-error" th:if="${#fields.hasErrors('price')}" th:errors="*{price}"></span>
                        </div>
                        <div class="form-group">
                            <label>Omborlagi miqdor</label>
                            <input type="number" th:field="*{stockQuantity}" class="form-input" placeholder="0"/>
                        </div>
                        <div class="form-group">
                            <label>Status</label>
                            <select th:field="*{status}" class="form-input">
                                <option th:each="s : ${statuses}" th:value="${s}" th:text="${s}"></option>
                            </select>
                        </div>
                        <div class="form-group full-width">
                            <label>Tavsif</label>
                            <textarea th:field="*{description}" class="form-input" rows="3" placeholder="Mahsulot haqida..."></textarea>
                        </div>
                    </div>
                    <div class="form-actions">
                        <a th:href="@{/products}" class="btn btn-secondary">Bekor qilish</a>
                        <button type="submit" class="btn btn-primary">Saqlash</button>
                    </div>
                </form>
            </div>
        </div>
    </main>
</div>
</body>
</html>
